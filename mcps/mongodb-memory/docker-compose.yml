version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mcp_mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-dako}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-harness}
    volumes:
      - mongo_data:/data/db
    restart: always
    
volumes:
  mongo_data: